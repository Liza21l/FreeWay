<!DOCTYPE html>
<html>
<head>
  <title>Маршрут</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.container{
    max-width:430px;
    margin:auto;
    min-height:100vh;
    padding:20px;
}

.leaflet-routing-container,
.leaflet-routing-itinerary{
    display:none !important;
}

.route-card{

    background:white;

    border-radius:28px;

    padding:24px;

    margin-bottom:20px;

    box-shadow:
        0 4px 15px rgba(0,0,0,.05);

}

.route-title{

    font-size:30px;

    font-weight:800;

    color:#163867;

    margin-bottom:8px;

}

.route-subtitle{

    color:#888;

    line-height:1.5;

}

#info{

    margin-top:18px;

    background:#edf4ff;

    color:#163867;

    padding:14px;

    border-radius:14px;

    font-weight:700;

}

#map{

    height:520px;

    width:100%;

    border-radius:24px;

    overflow:hidden;

    box-shadow:
        0 4px 15px rgba(0,0,0,.05);

}

.back-btn{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    width:42px;

    height:42px;

    border-radius:12px;

    background:#edf4ff;

    color:#163867;

    text-decoration:none;

    font-size:20px;

    font-weight:700;

    margin-bottom:18px;

}
  </style>
</head>
<body>
<div class="container">

    <a href="{% url 'home' %}" class="back-btn">←</a>

    <div class="route-card">
        <div class="route-title">Ваш маршрут</div>
        <div class="route-subtitle">
            Маршрут успішно побудовано.
            Нижче відображається карта та інформація про відстань.
        </div>
        <div id="info">
            Відстань: <span id="distance"></span><br>
            Час: <span id="time"></span>
        </div>
    </div>

    <div id="map" style="height:500px;width:100%;"></div>

</div>

{{ coords|json_script:"coords-data" }}

<!-- ✅ Підключаємо Google Maps JS API -->
<script src="https://maps.googleapis.com/maps/api/js?key={{ directions_api_key }}&libraries=places"></script>

<script>
    const coords = JSON.parse(document.getElementById('coords-data').textContent);

    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 14,
        center: { lat: coords[0].lat, lng: coords[0].lon }
    });

    const directionsService = new google.maps.DirectionsService();
    const directionsRenderer = new google.maps.DirectionsRenderer({ map });

    const waypoints = coords.slice(1, coords.length-1).map(p => ({
        location: { lat: p.lat, lng: p.lon },
        stopover: true
    }));

    directionsService.route({
        origin: { lat: coords[0].lat, lng: coords[0].lon },
        destination: { lat: coords[coords.length-1].lat, lng: coords[coords.length-1].lon },
        waypoints: waypoints,
        travelMode: google.maps.TravelMode.WALKING,
        optimizeWaypoints: true
    }, (result, status) => {
        if (status === "OK") {
            directionsRenderer.setDirections(result);

            let distance = 0, duration = 0;
            result.routes[0].legs.forEach(leg => {
                distance += leg.distance.value;
                duration += leg.duration.value;
            });

            document.getElementById("distance").innerHTML = (distance/1000).toFixed(1) + " км";
            document.getElementById("time").innerHTML = Math.round(duration/60) + " хв";
        } else {
            console.error("Directions request failed:", status);
        }
    });
</script>
</body>
</html>

</html>
