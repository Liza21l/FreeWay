<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />

    <title>AI Route</title>
</head>
<style>
    body{
    width:100%;
    background:#f5f4f2;
    font-family:'Segoe UI',sans-serif;
}
.header{
    background:#163867;
    color:white;
    padding:35px 25px 45px;
    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;
    position:relative;
}

.header h1{
    margin:10px 0;
    font-size:42px;
    font-weight:700;
}

.header p{
    font-size:18px;
    line-height:1.5;
    margin:0;
}

.back-btn{
    position:absolute;
    top:15px;


    width:44px;
    height:44px;

    background:rgba(255,255,255,.12);

    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;
    color:white;

    font-size:24px;
    font-weight:bold;
}

.page-header{
    background:#163867;
    color:white;
    padding:40px 30px;
    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;
}

.page-header h1{
    margin:0;
    font-size:48px;
    font-weight:700;
}

.page-header p{
    margin-top:12px;
    font-size:18px;
    opacity:.95;
}

#ai-route-form{
    max-width:900px;
    margin:30px auto;
    background:white;
    border-radius:28px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.route-name-field,
.route-city-field,
.route-visibility-field{
    margin-bottom:25px;
}

.route-name-field label,
.route-city-field label,
.route-visibility-field label{
    display:block;
    margin-bottom:10px;
    font-weight:700;
    color:#163867;
}

.route-name-field input,
.route-city-field select,
.route-visibility-field select{
    width:100%;
    padding:18px 20px;
    border:1px solid #d8d8d8;
    border-radius:20px;
    font-size:16px;
    background:white;
    box-sizing:border-box;
}

.section-title{
    margin-top:20px;
    margin-bottom:20px;
    color:#8c8c8c;
    font-weight:700;
    letter-spacing:2px;
}

.categories-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.category-card{
    background:#f5f4f2;
    border-radius:24px;
    padding:25px;
    cursor:pointer;
    transition:.25s;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:12px;
    border:2px solid transparent;
}

.category-card:hover{
    transform:translateY(-3px);
}

.category-card input{
    display:none;
}

.category-icon{
    font-size:34px;
}

.category-name{
    font-size:18px;
    font-weight:700;
    color:#163867;
}

.category-card:has(input:checked){
    border:2px solid #163867;
    background:#eef4ff;
}

.find-btn{
    width:100%;
    margin-top:30px;
    padding:18px;
    border:none;
    border-radius:20px;
    background:#163867;
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
}

.find-btn:hover{
    opacity:.95;
}

#ai-routes-result{
    max-width:900px;
    margin:30px auto;
}

.route-card{
    background:white;
    border-radius:24px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.route-card h4{
    color:#163867;
    font-size:24px;
    margin-bottom:15px;
}

.route-card ul{
    padding-left:18px;
}

.route-card li{
    margin-bottom:8px;
}

.route-card label{
    font-weight:600;
    color:#163867;
}

.route-card input[type="radio"]{
    margin-right:8px;
}
.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #163867;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 0 auto 10px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.error {
  color: red;
  font-weight: bold;
  margin-bottom: 10px;
}

.retry-btn {
  background: #163867;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 5px;
  cursor: pointer;
}
.retry-btn:hover {
  background: #0f2850;
}


[id^="map-"]{
    border-radius:20px;
    overflow:hidden;
}

[id^="info-"]{
    margin-top:15px;
    background:#f5f4f2;
    border-radius:15px;
    padding:12px;
    text-align:center;
    color:#163867;
    font-weight:700;
}
@media (max-width:768px){

    .categories-grid{
        grid-template-columns:1fr 1fr;
        gap:14px;
    }

    .category-card{
        
        padding:18px;
    }

    .category-name{
        font-size:12px;
    }

    .category-icon{
        font-size:30px;
    }

}
</style>
<body>
<div class="page-header">
    <a href="{% url 'home' %}" class="back-btn">
        ←
    </a>

    <h1>Маршрут з ШІ</h1>

    <p>
        Оберіть місто та категорії, а ШІ запропонує
        кілька готових маршрутів для прогулянки.
    </p>

</div>
<form id="ai-route-form" method="post" action="{% url 'ai_route' %}">
    {% csrf_token %}
    <div class="route-name-field">
        <label for="aiRouteName">Назва маршруту:</label>
        <input type="text" id="aiRouteName" name="route_name" placeholder="Наприклад: Прогулянка з ШІ">
    </div>

    <div class="route-city-field">
        <label for="aiCity">Місто:</label>
        <select id="aiCity" name="city">
            {% for city in cities %}
                <option value="{{ city.name }}">{{ city.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="route-visibility-field">
        <label for="aiVisibility">Видимість:</label>
        <select id="aiVisibility" name="visibility">
            <option value="private">Особистий</option>
            <option value="public">Публічний</option>
        </select>
    </div>

    <div class="section-title">КАТЕГОРІЇ</div>
    <div class="categories-grid">

        <label class="category-card">
            <input type="checkbox" name="categories" value="restaurant">
            <span class="category-icon">🍽️</span>
            <span class="category-name">Ресторани</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="cafe">
            <span class="category-icon">☕</span>
            <span class="category-name">Кафе</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="museum">
            <span class="category-icon">🏛️</span>
            <span class="category-name">Музеї</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="park">
            <span class="category-icon">🌳</span>
            <span class="category-name">Парки</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="meal_takeaway">
            <span class="category-icon">🍔</span>
            <span class="category-name">Фастфуд</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="bar">
            <span class="category-icon">🍹</span>
            <span class="category-name">Бари</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="supermarket">
            <span class="category-icon">🛒</span>
            <span class="category-name">Супермаркети</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="night_club">
            <span class="category-icon">🎵</span>
            <span class="category-name">Нічні клуби</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="bakery">
            <span class="category-icon">🥐</span>
            <span class="category-name">Пекарні</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="movie_theater">
            <span class="category-icon">🎬</span>
            <span class="category-name">Кінотеатри</span>
        </label>

        <label class="category-card">
            <input type="checkbox" name="categories" value="tourist_attraction">
            <span class="category-icon">📍</span>
            <span class="category-name">Пам'ятки</span>
        </label>

    </div>

    <button type="submit" class="find-btn">Побудувати маршрут з ШІ</button>
</form>

<div id="ai-routes-result"></div>

<script>
document.getElementById("ai-route-form").addEventListener("submit", function(e){
    e.preventDefault();

    const routeName = document.getElementById("aiRouteName").value;
    const city = document.getElementById("aiCity").value;
    const visibility = document.getElementById("aiVisibility").value;

    const categories = [
        ...document.querySelectorAll("#ai-route-form input[name='categories']:checked")
    ].map(c => c.value);

    const block = document.getElementById("ai-routes-result");

    // показуємо спіннер
    block.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>Маршрут будується...</p>
      </div>
    `;

    document.getElementById("ai-route-form").style.display = "none";

    fetch("{% url 'ai_route' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            route_name: routeName,
            city,
            categories,
            visibility
        })
    })
    .then(res => res.json())
    .then(data => {
        block.innerHTML = "";

        const routes = data.routes || [];

        if (!Array.isArray(routes) || routes.length === 0) {
            block.innerHTML = `
              <p class="error">Не вдалося побудувати маршрут.</p>
              <button class="retry-btn" onclick="retryRoute()">Спробувати ще раз</button>
            `;
            return;
        }

        routes.forEach((routeData, i) => {
            const route = routeData.places || [];
            const div = document.createElement("div");
            div.className = "route-card";

            div.innerHTML = `
                <h4>${routeData.name || `Варіант ${i + 1}`}</h4>
                <label>
                    <input type="radio" name="selectedRoute" value="${i}">
                    Обрати цей маршрут
                </label>
                <ul>
                    ${route.map(p => `
                        <li>
                            <b>${p.name || '—'}</b>
                            (${p.category || '—'})
                            ⭐ ${p.rating || '—'}
                        </li>
                    `).join("")}
                </ul>
                <div id="map-${i}" style="height:300px; margin-top:10px;"></div>
                <div id="info-${i}"></div>
            `;

            block.appendChild(div);

            if (route.length > 0 && route[0].lat && route[0].lon) {
                const map = L.map(`map-${i}`).setView([route[0].lat, route[0].lon], 14);
                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                    attribution:"© OpenStreetMap"
                }).addTo(map);

                route.forEach((place, idx) => {
                    if (place.lat && place.lon) {
                        L.marker([place.lat, place.lon])
                        .bindPopup(`<b>${idx + 1}. ${place.name}</b><br>Рейтинг: ${place.rating || '—'}`)
                        .addTo(map);
                    }
                });

                if (route.length > 1) {
                    const control = L.Routing.control({
                        waypoints: route.map(p => L.latLng(p.lat, p.lon)),
                        router: L.Routing.osrmv1({
                            serviceUrl:"https://router.project-osrm.org/route/v1",
                            profile:"foot",
                        }),
                        lineOptions:{ styles:[{ color:"#4A90E2", weight:5, opacity:0.85 }] },
                        createMarker: () => null,
                        show:false,
                    }).addTo(map);

                    control.on("routesfound", (e) => {
                        const r = e.routes[0];
                        const km = (r.summary.totalDistance / 1000).toFixed(2);
                        const min = Math.round(r.summary.totalTime / 7);
                        document.getElementById(`info-${i}`).innerHTML = `
                            Маршрут: <b>${km} км</b> | Час пішки: <b>~${min} хв</b>
                        `;
                    });
                }
            }
        });

        const saveBtn = document.createElement("button");
        saveBtn.textContent = "Зберегти вибраний маршрут";
        saveBtn.className = "find-btn";

        saveBtn.onclick = () => {
            const selectedIndex = document.querySelector("input[name='selectedRoute']:checked");
            if (!selectedIndex) {
                alert("Оберіть один маршрут!");
                return;
            }
            const selectedRoute = routes[selectedIndex.value].places;
            fetch("{% url 'save_ai_route' %}", {
                method: "POST",
                headers: {
                    "Content-Type":"application/json",
                    "X-CSRFToken":"{{ csrf_token }}"
                },
                body: JSON.stringify({
                    route_name: routeName,
                    city,
                    visibility,
                    places: selectedRoute
                })
            })
            .then(res => res.json())
            .then(resp => {
                alert("Маршрут збережено! ID: " + resp.route_id);
            })
            .catch(err => {
                console.error(err);
                alert("Помилка збереження маршруту");
            });
        };

        block.appendChild(saveBtn);
    })
    .catch(err => {
        console.error(err);
        block.innerHTML = `
          <p class="error">Сталася помилка, спробуйте ще раз.</p>
          <button class="retry-btn" onclick="retryRoute()">Спробувати ще раз</button>
        `;
    });
});

// функція повторної спроби
function retryRoute(){
    document.getElementById("ai-route-form").style.display = "block";
    document.getElementById("ai-routes-result").innerHTML = "";
    document.getElementById("ai-route-form").scrollIntoView({ behavior: "smooth", block: "center" });
}
</script>

</body>
</html>
