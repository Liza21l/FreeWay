<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список місць</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* КРОКИ */

.steps{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
    position:relative;
}

.steps::before{
    content:"";
    position:absolute;
    top:18px;
    left:55px;
    right:55px;
    height:2px;
    background:#e4e4e4;
    z-index:1;
}

.step{
    position:relative;
    z-index:2;
    text-align:center;
    flex:1;
}

.circle{
    width:38px;
    height:38px;
    border-radius:50%;
    background:#e9e9e9;
    color:#888;
    margin:0 auto 8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    transition:0.3s;
}

.completed .circle{
    background:#163867;
    color:white;
}

.active .circle{
    border:3px solid #163867;
    color:#163867;
    background:white;
}

.step p{
    font-size:13px;
    color:#666;
    font-weight:600;
}

/* HEADER */

.city-title{
    font-size:30px;
    font-weight:700;
    color:#163867;
    margin-bottom:8px;
}

.subtitle{
    color:#8b8b8b;
    margin-bottom:25px;
    font-size:14px;
}

/* КАТЕГОРІЇ */

.categories-form{
    margin-bottom:30px;
}

.categories-scroll{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:5px;
}

.categories-scroll::-webkit-scrollbar{
    display:none;
}

.category-pill input{
    display:none;
}

.category-pill label{
    display:flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
    padding:12px 18px;
    border-radius:30px;
    background:#f3f3f3;
    cursor:pointer;
    border:1.5px solid transparent;
    transition:0.3s;
    font-size:14px;
    font-weight:600;
    color:#666;
}

.category-pill input:checked + label{
    background:#163867;
    color:white;
}

.update-btn{
    margin-top:18px;
    width:100%;
    height:52px;
    border:none;
    border-radius:16px;
    background:#163867;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

/* МІСЦЯ */

.places-title{
    font-size:22px;
    font-weight:700;
    color:#163867;
    margin-bottom:18px;
}

.places-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:16px;
    margin-bottom:30px;
}

.place-card{
    position:relative;
    width:100%;
}

.place-card input{
    display:none;
}

.place-label{
    display:block;
    width:100%;
    border:1.5px solid #e2e2e2;
    border-radius:20px;
    padding:18px 14px;
    background:white;
    cursor:pointer;
    transition:0.3s;
    min-height:150px;
    position:relative;
    overflow:hidden;
}

.place-card input:checked + .place-label{
    border-color:#163867;
    background:#edf4ff;
}

.check-circle{
    position:absolute;
    top:12px;
    right:12px;
    width:24px;
    height:24px;
    border-radius:50%;
    border:2px solid #d8d8d8;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:13px;
    transition:0.3s;
}

.place-card input:checked + .place-label .check-circle{
    background:#163867;
    border-color:#163867;
    color:white;
}

.place-icon{
    width:52px;
    height:52px;
    border-radius:14px;
    background:#f4f7fb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.place-name{
    margin-top:14px;
    color:#163867;
    font-size:17px;
    font-weight:700;
    line-height:1.3;
}

.place-category{
    color:#8b8b8b;
    font-size:13px;
    margin-top:6px;
    line-height:1.4;
}

/* BUTTON */

.submit-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:#163867;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.loader{
    width:22px;
    height:22px;
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid white;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    display:none;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.empty{
    color:#888;
    text-align:center;
    padding:30px 0;
}
/* КНОПКА ФІЛЬТРАЦІЇ */
.filter-btn {
    margin-bottom:20px;
    padding:12px 20px;
    background:#163867;
    color:white;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
.filter-btn:hover {
    background:#0f2850;
}

/* МОДАЛЬНЕ ВІКНО */
.filter-modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2000;
}

/* ВМІСТ МОДАЛЬНОГО ВІКНА */
.filter-content {
    background:white;
    padding:25px 30px;
    border-radius:20px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
    text-align:center;
    max-width:320px;
    width:90%;
    animation:fadeIn 0.3s ease;
}

.filter-content h3 {
    font-size:18px;
    font-weight:700;
    color:#163867;
    margin-bottom:15px;
}

.filter-content select {
    width:100%;
    padding:10px 12px;
    border-radius:12px;
    border:1.5px solid #e2e2e2;
    font-size:14px;
    margin-bottom:18px;
    outline:none;
    transition:0.3s;
}
.filter-content select:focus {
    border-color:#163867;
    background:#edf4ff;
}

/* КНОПКИ В МОДАЛЬНОМУ ВІКНІ */
#applyFilter, #closeFilter {
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
    transition:0.3s;
}

#applyFilter {
    background:#163867;
    color:white;
}
#applyFilter:hover {
    background:#0f2850;
}

#closeFilter {
    background:#f3f3f3;
    color:#666;
}
#closeFilter:hover {
    background:#e2e2e2;
}

/* Анімація появи */
@keyframes fadeIn {
    from { opacity:0; transform:translateY(-10px); }
    to { opacity:1; transform:translateY(0); }
}


/* ---------- ПЛАНШЕТ ---------- */

@media (min-width:768px){

    .container{
        max-width:900px;
        padding:35px;
    }

    .places-grid{
        grid-template-columns:repeat(3, minmax(0,1fr));
    }

    .city-title{
        font-size:36px;
    }
}

/* ---------- КОМП'ЮТЕР ---------- */

@media (min-width:1200px){

    .container{
        max-width:1300px;
        padding:40px;
    }

    .places-grid{
        grid-template-columns:repeat(4, minmax(0,1fr));
    }

    .city-title{
        font-size:42px;
    }
}

/* ---------- ТЕЛЕФОНИ ---------- */

@media (max-width:480px){

    body{
        padding:12px;
    }

    .container{
        padding:20px 14px;
        border-radius:24px;
    }

    .place-label{
        min-height:135px;
        padding:14px 12px;
    }

    .place-name{
        font-size:15px;
    }

    .place-category{
        font-size:12px;
    }

    .city-title{
        font-size:26px;
    }

    .steps::before{
        left:35px;
        right:35px;
    }

    .step p{
        font-size:11px;
    }
}

</style>

</head>

<body>

<div class="container">

    <!-- КРОКИ -->

    <div class="steps">

        <div class="step completed">
            <div class="circle">✓</div>
            <p>Локація</p>
        </div>

        <div class="step completed" id="step2">
            <div class="circle" id="step2Circle">✓</div>
            <p>Місця</p>
        </div>

        <div class="step active" id="step3">
            <div class="circle" id="step3Circle">3</div>
            <p>Маршрут</p>
        </div>

    </div>

    <!-- HEADER -->

    <h1 class="city-title">
        {{ city.name }}
    </h1>

    <p class="subtitle">
        Оберіть категорії та місця для маршруту
    </p>

    <!-- КАТЕГОРІЇ -->

    <form method="GET" action="{% url 'place_list' %}" class="categories-form">

        <input type="hidden" name="city" value="{{ city.id }}">

        <div class="categories-scroll">

            {% for value, label in all_categories %}

            <div class="category-pill">

                <input type="checkbox"
                       id="{{ value }}"
                       name="category"
                       value="{{ value }}"
                       {% if value in selected_categories %}checked{% endif %}>

                <label for="{{ value }}">
                    {{ label }}
                </label>

            </div>

            {% endfor %}

        </div>

        <button type="submit" class="update-btn">
            Оновити категорії
        </button>

    </form>

    <!-- МІСЦЯ -->

    <form method="POST" action="{% url 'build_route' %}" id="routeForm">
        {% csrf_token %}

        <h2 class="places-title">
            Виберіть місця
        </h2>

        <!-- КНОПКА ФІЛЬТРАЦІЇ -->
        <button type="button" id="filterBtn" class="filter-btn">
            🔍 Фільтрувати
        </button>

        <!-- МОДАЛЬНЕ ВІКНО -->
        <div id="filterModal" class="filter-modal" style="display:none;">
          <div class="filter-content">
            <h3>Виберіть категорію</h3>
            <select id="filterSelect">
              <option value="">Усі категорії</option>
              {% for value in selected_categories %}
                <option value="{{ value }}">{{ value|capfirst }}</option>
              {% endfor %}
            </select>
            <button type="button" id="applyFilter">Застосувати</button>
            <button type="button" id="closeFilter">Закрити</button>
          </div>
        </div>

        <div class="places-grid">
            {% for place in places %}
            <div class="place-card" data-category="{{ place.category }}">
                <input type="checkbox"
                       id="place{{ place.id }}"
                       name="place_ids"
                       value="{{ place.id }}">
                <label for="place{{ place.id }}" class="place-label">
                    <div class="check-circle">✓</div>
                    <div class="place-icon">
                        {% if place.category == 'cafe' %}☕
                        {% elif place.category == 'restaurant' %}🍽️
                        {% elif place.category == 'museum' %}🏛️
                        {% elif place.category == 'bar' %}🍹
                        {% elif place.category == 'park' %}🌳
                        {% elif place.category == 'cinema' %}🎬
                        {% elif place.category == 'fast_food' %}🍔
                        {% elif place.category == 'bakery' %}🥐
                        {% elif place.category == 'nightclub' %}🎵
                        {% elif place.category == 'theatre' %}🎭
                        {% elif place.category == 'supermarket' %}🛒
                        {% else %}📍{% endif %}
                    </div>
                    <div class="place-name">{{ place.name }}</div>
                    <div class="place-category">{{ place.get_category_display }}</div>
                    {% if place.rating %}
                      <div class="place-rating">⭐ {{ place.rating }}</div>
                    {% endif %}
                    {% if place.is_open %}
                      <span style="color:green">Відкрито</span>
                    {% else %}
                      <span style="color:red">Закрито</span>
                    {% endif %}
                </label>
            </div>
            {% empty %}
            <div class="empty">Місць не знайдено</div>
            {% endfor %}
        </div>

        <label>
          <input type="radio" name="visibility" value="private" checked> Особистий
        </label>
        <label>
          <input type="radio" name="visibility" value="public"> Публічний
        </label>

        <button type="submit" class="submit-btn" id="submitBtn">
            <span id="btnText">Скласти маршрут</span>
            <div class="loader" id="loader"></div>
        </button>
    </form>

</div>

<script>
    const routeForm = document.getElementById("routeForm");
    const loader = document.getElementById("loader");
    const btnText = document.getElementById("btnText");

    const step3 = document.getElementById("step3");
    const step3Circle = document.getElementById("step3Circle");

    // масив для збереження вибраних місць
    let selectedPlaces = new Set(JSON.parse(localStorage.getItem("selectedPlaces") || "[]"));

    // відновлюємо стан чекбоксів при завантаженні сторінки
    document.querySelectorAll("input[name='place_ids']").forEach(cb => {
        if (selectedPlaces.has(cb.value)) {
            cb.checked = true;
        }
        cb.addEventListener("change", () => {
            if (cb.checked) {
                selectedPlaces.add(cb.value);
            } else {
                selectedPlaces.delete(cb.value);
            }
            // зберігаємо у LocalStorage
            localStorage.setItem("selectedPlaces", JSON.stringify([...selectedPlaces]));
        });
    });

    routeForm.addEventListener("submit", function(){
        step3.classList.remove("active");
        step3.classList.add("completed");

        step3Circle.innerHTML = "✓";

        loader.style.display = "block";
        btnText.innerHTML = "Створення маршруту...";
    });

    document.getElementById("filterBtn").addEventListener("click", () => {
        document.getElementById("filterModal").style.display = "flex";
    });

    document.getElementById("closeFilter").addEventListener("click", () => {
        document.getElementById("filterModal").style.display = "none";
    });

    document.getElementById("applyFilter").addEventListener("click", () => {
        const selectedCategory = document.getElementById("filterSelect").value;
        document.querySelectorAll(".place-card").forEach(card => {
            const category = card.getAttribute("data-category");
            const checkbox = card.querySelector("input[name='place_ids']");

            // показуємо/ховаємо картки
            if (!selectedCategory || category === selectedCategory) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }

            // відновлюємо стан чекбокса
            if (selectedPlaces.has(checkbox.value)) {
                checkbox.checked = true;
            }
        });
        document.getElementById("filterModal").style.display = "none";
    });
</script>


</body>
</html>
