<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Маршрут {{ route.id }}</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.container{
    max-width:430px;
    margin:auto;
    min-height:100vh;
    background:#f7f5f2;
}

/* HEADER */

.header{
    background:#163867;
    color:white;
    padding:24px;
    padding-top:60px;
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
}

.header h1{
    font-size:30px;
    font-weight:800;
    margin-bottom:8px;
}

.header p{
    color:rgba(255,255,255,.75);
    line-height:1.5;
}

/* ALERTS */

.messages{
    padding:20px;
}

.alert{
    padding:14px;
    border-radius:16px;
    margin-bottom:10px;
    font-weight:600;
}

.alert.success{
    background:#e8f8ec;
    color:#217a3b;
}

.alert.error{
    background:#fdeaea;
    color:#b83232;
}

/* INFO CARD */

.info-card{
    margin:20px;
    background:white;
    border-radius:24px;
    padding:18px;
    box-shadow:0 3px 12px rgba(0,0,0,.05);
}

#info{
    color:#163867;
    font-size:16px;
    font-weight:700;
}

/* MAP */

.map-card{
    margin:0 20px;
    overflow:hidden;
    border-radius:24px;
    box-shadow:0 3px 12px rgba(0,0,0,.05);
}

#map{
    height:500px;
    width:100%;
}

/* BUTTON */

.route-form{
    padding:20px;
}

.add-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:#163867;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.add-btn:hover{
    transform:translateY(-2px);
}

.leaflet-routing-container,
.leaflet-routing-itinerary{
    display:none !important;
}

</style>
</head>
<body>

<body>

    <div class="container">

        <div class="header">

            <h1>Маршрут</h1>

            <p>
                Маршрут від {{ route.user.first_name }}
            </p>

        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="alert {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="info-card">
            <div id="info">
                Будуємо маршрут...
            </div>
        </div>

        <div class="map-card">
            <div id="map"></div>
        </div>

        <form method="POST" class="route-form">
            {% csrf_token %}

            <button type="submit" class="add-btn">
                ➕ Додати до моїх маршрутів
            </button>
        </form>

    </div>

  {{ coords|json_script:"coords-data" }}

  <script>
    const coords = JSON.parse(document.getElementById('coords-data').textContent);

    const map = L.map('map').setView([coords[0].lat, coords[0].lon], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    const COLORS = { cafe: '#E8793A', restaurant: '#E84A4A', museum: '#4A90E2' };

    coords.forEach((place, i) => {
      const color = COLORS[place.category] || '#888';
      const icon = L.divIcon({
        html: `<div style="
          background:${color}; color:#fff; border-radius:50%;
          width:30px; height:30px; display:flex;
          align-items:center; justify-content:center;
          font-weight:bold; font-size:14px;
          border:2px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,.3);
        ">${i + 1}</div>`,
        iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -18]
      });
      L.marker([place.lat, place.lon], { icon })
        .bindPopup(`<b>${i + 1}. ${place.name}</b><br>Рейтинг: ${place.rating || '—'}`)
        .addTo(map);
    });

    if (coords.length > 1) {
      const control = L.Routing.control({
        waypoints: coords.map(p => L.latLng(p.lat, p.lon)),
        router: L.Routing.osrmv1({
          serviceUrl: 'https://router.project-osrm.org/route/v1',
          profile: 'foot',
        }),
        lineOptions: {
          styles: [{ color: '#4A90E2', weight: 5, opacity: 0.85 }]
        },
        createMarker: () => null,
        show: false,
      }).addTo(map);

      control.on('routesfound', (e) => {
        const r   = e.routes[0];
        const km  = (r.summary.totalDistance / 1000).toFixed(2);
        const min = Math.round(r.summary.totalTime / 60);
        document.getElementById('info').innerHTML =
          `Маршрут по вулицях: <b>${km} км</b> | Час пішки: <b>~${min} хв</b>`;
      });
    }
  </script>

</body>

</html>
