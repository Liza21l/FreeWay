<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Найближчі місця</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    min-height:100vh;
    background:#f7f5f2;
}

/* HEADER */

.header{
    background:#163867;
    color:white;
    padding:24px;
    padding-top:70px;
    border-bottom-left-radius:32px;
    border-bottom-right-radius:32px;
    position:relative;
}

.back-btn{
    position:absolute;
    top:20px;
    left:20px;

    width:44px;
    height:44px;

    border-radius:14px;
    background:rgba(255,255,255,.12);

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;
    color:white;
    font-size:22px;
}

.header h1{
    font-size:34px;
    font-weight:800;
    line-height:1.1;
    margin-bottom:10px;
}

.header p{
    color:rgba(255,255,255,.8);
    line-height:1.5;
}

/* CARD */

.search-card{
    background:white;
    margin:24px;
    padding:22px;
    border-radius:24px;
    box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.section-title{
    color:#999;
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:14px;
}

/* CATEGORIES */

.categories-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.category-card{
    position:relative;
}

.category-card input{
    display:none;
}

.category-card label{
    display:flex;
    flex-direction:column;
    gap:8px;

    padding:18px;
    min-height:95px;

    background:#f3f1eb;
    border-radius:20px;
    cursor:pointer;

    transition:.25s;
}

.category-card input:checked + label{
    background:#edf4ff;
    border:1px solid #b7d2ff;
}

.category-icon{
    font-size:24px;
}

.category-name{
    font-weight:700;
    color:#163867;
}

/* BUTTON */

.find-btn{
    width:100%;
    height:58px;

    border:none;
    border-radius:18px;

    background:#163867;
    color:white;

    font-size:16px;
    font-weight:700;

    cursor:pointer;

    margin-top:20px;
}

/* LOADING */

.loading{
    display:none;
    padding:40px 24px;
    text-align:center;
}

.spinner{
    width:60px;
    height:60px;

    border:5px solid #d9e6ff;
    border-top:5px solid #163867;

    border-radius:50%;

    margin:auto;

    animation:spin .8s linear infinite;
}

.loading-text{
    margin-top:15px;
    color:#163867;
    font-weight:700;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* RESULT */

.result-card{
    display:none;

    margin:24px;
    background:white;

    border-radius:24px;
    overflow:hidden;

    box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.result-header{
    padding:20px;
    border-bottom:1px solid #eee;
}

.route-title{
    color:#163867;
    font-size:22px;
    font-weight:800;
}

#info{
    margin-top:8px;
    color:#666;
    font-weight:600;
}

#map {
  width: 100%;
  height: 400px; /* або більше */
  margin-top: 15px;
}

/* PLACES */

.places-list{
    padding:20px;
}

.place-item{
    background:#f3f1eb;
    border-radius:16px;
    padding:14px;
    margin-bottom:10px;
}

.place-name{
    color:#163867;
    font-weight:700;
    margin-bottom:5px;
}

.place-category{
    color:#777;
    font-size:14px;
}

/* LEAFLET */

.leaflet-routing-container,
.leaflet-routing-alt,
.leaflet-routing-itinerary{
    display:none !important;
}

</style>
</head>
<body>
<div class="container">

    <div class="header">

        <a href="{% url 'home' %}" class="back-btn">
            ←
        </a>

        <h1>Найближчі місця</h1>

        <p>
            Обери категорії закладів та побудуй маршрут від свого місцезнаходження
        </p>

    </div>
    <div id="info" style="display:none; text-align:center; margin:10px; font-weight:bold;">
      Побудова маршруту...
    </div>

    <div class="search-card">
      {% if messages %}
        <div class="container mt-3">
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}


        <div class="section-title">
            КАТЕГОРІЇ
        </div>

        <form id="categories-form" method="post" action="{% url 'nearby_places' %}">
            {% csrf_token %}
            <div class="categories-grid">

                <div class="category-card">
                    <input type="checkbox" id="restaurant" name="categories" value="restaurant">
                    <label for="restaurant">
                        <div class="category-icon">🍽</div>
                        <div class="category-name">Ресторани</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="cafe" name="categories" value="cafe">
                    <label for="cafe">
                        <div class="category-icon">☕</div>
                        <div class="category-name">Кафе</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="bar" name="categories" value="bar">
                    <label for="bar">
                        <div class="category-icon">🍹</div>
                        <div class="category-name">Бари</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="park" name="categories" value="park">
                    <label for="park">
                        <div class="category-icon">🌳</div>
                        <div class="category-name">Парки</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="museum" name="categories" value="museum">
                    <label for="museum">
                        <div class="category-icon">🏛</div>
                        <div class="category-name">Музеї</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="attraction" name="categories" value="tourist_attraction">
                    <label for="attraction">
                        <div class="category-icon">📍</div>
                        <div class="category-name">Пам'ятки</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="fastfood" name="categories" value="fast_food">
                    <label for="fastfood">
                        <div class="category-icon">🍔</div>
                        <div class="category-name">Фастфуд</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="nightclub" name="categories" value="night_club">
                    <label for="nightclub">
                        <div class="category-icon">🎵</div>
                        <div class="category-name">Нічні клуби</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="bakery" name="categories" value="bakery">
                    <label for="bakery">
                        <div class="category-icon">🥐</div>
                        <div class="category-name">Пекарні</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="supermarket" name="categories" value="supermarket">
                    <label for="supermarket">
                        <div class="category-icon">🛒</div>
                        <div class="category-name">Супермаркети</div>
                    </label>
                </div>

                <div class="category-card">
                    <input type="checkbox" id="theater" name="categories" value="movie_theater">
                    <label for="theater">
                        <div class="category-icon">🎭</div>
                        <div class="category-name">Театри</div>
                    </label>
                </div>

            </div>

            <button type="submit" class="find-btn">
                Побудувати маршрут
            </button>

        </form>

    </div>

    <div class="loading" id="loading">

        <div class="spinner"></div>

        <div class="loading-text">
            Шукаємо найкращі місця поруч...
        </div>

    </div>

    <div class="result-card" id="resultCard">

        <div class="result-header">

            <div class="route-title">
                Ваш маршрут
            </div>

        </div>

        <div id="map"></div>

        <div class="places-list" id="placesList">

        </div>

    </div>

</div>
<script>
    let userLat, userLon;
    let map = null;
    let routingControl = null;

    // Отримуємо геолокацію користувача
    navigator.geolocation.getCurrentPosition(pos => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
    }, err => {
        alert("Не вдалося отримати геолокацію: " + err.message);
    });

    document.getElementById("categories-form").addEventListener("submit", e => {
        e.preventDefault();

        const categories = Array.from(document.querySelectorAll("input[name=categories]:checked"))
                                .map(cb => cb.value);

        // ✅ ховаємо блок із категоріями
        document.querySelector(".search-card").style.display = "none";

        // ✅ показуємо повідомлення про завантаження
        const infoBlock = document.getElementById("info");
        infoBlock.style.display = "block";
        infoBlock.innerHTML = "Побудова маршруту...";

        fetch("{% url 'nearby_places' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ lat: userLat, lon: userLon, categories: categories })
        })
        .then(res => res.json())
        .then(data => {
            const places = data.places;

            document.getElementById("resultCard").style.display = "block";

            if (places.length === 0) {
                infoBlock.innerHTML = "Немає місць у вибраних категоріях.";
                return;
            }

            // ✅ після успішного створення маршруту ховаємо блок info
            infoBlock.style.display = "none";

            if (map !== null) {
                map.remove();
            }
            map = L.map("map").setView([userLat, userLon], 14);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "© OpenStreetMap"
            }).addTo(map);

            const userIcon = L.divIcon({
                html: `<div style="
                    background:#E84A4A; color:#fff; border-radius:50%;
                    width:30px; height:30px; display:flex;
                    align-items:center; justify-content:center;
                    font-weight:bold; font-size:14px;
                    border:2px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,.3);
                ">🚶</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15],
                popupAnchor: [0, -18]
            });

            L.marker([userLat, userLon], { icon: userIcon })
              .bindPopup("Ви тут")
              .addTo(map);

            places.forEach((p, i) => {
                L.marker([p.lat, p.lon])
                  .bindPopup(`${i+1}. ${p.name} (${p.category})`)
                  .addTo(map);
            });

            const waypoints = [L.latLng(userLat, userLon)].concat(
                places.map(p => L.latLng(p.lat, p.lon))
            );

            if (routingControl !== null) {
                map.removeControl(routingControl);
            }

            routingControl = L.Routing.control({
                waypoints: waypoints,
                router: L.Routing.osrmv1({
                    serviceUrl: "https://router.project-osrm.org/route/v1",
                    profile: "foot"
                }),
                lineOptions: { styles: [{ color: "#4A90E2", weight: 5, opacity: 0.85 }] },
                createMarker: () => null,
                show: false,
                addWaypoints: false,
                draggableWaypoints: false,
                fitSelectedRoutes: true,
                showAlternatives: false,
                altLineOptions: { styles: [] }
            }).addTo(map);
        })
        .catch(err => {
            console.error("Помилка при побудові маршруту:", err);
            infoBlock.style.display = "block";
            infoBlock.innerHTML = "Сталася помилка при побудові маршруту.";
        });
    });
</script>
</body>
</html>
