<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .auth-container{
            width:100%;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .auth-card{
            width:100%;
            max-width:430px;
            background:#fff;
            border-radius:32px;
            padding:40px 30px;
            border:1px solid #e8e8e8;
            box-shadow:0 4px 20px rgba(0,0,0,0.04);
        }

        .logo{
            width:70px;
            height:70px;
            background:#edf3fb;
            border-radius:20px;
            margin:0 auto 25px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:30px;
            color:#163867;
            font-weight:bold;
        }

        .title{
            text-align:center;
            font-size:34px;
            color:#163867;
            font-weight:700;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#8c8c8c;
            font-size:15px;
            margin-bottom:35px;
            line-height:1.5;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            color:#444;
            font-size:14px;
            font-weight:500;
        }

        .form-group input{
            width:100%;
            height:56px;
            border:1.5px solid #dcdcdc;
            border-radius:16px;
            padding:0 18px;
            font-size:15px;
            outline:none;
            transition:0.3s;
        }

        .form-group input:focus{
            border-color:#1d4f91;
            box-shadow:0 0 0 3px rgba(29,79,145,0.08);
        }

        .submit-btn{
            width:100%;
            height:58px;
            border:none;
            border-radius:16px;
            background:#163867;
            color:white;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-btn:hover{
            background:#102c55;
        }

        .divider{
            text-align:center;
            margin:25px 0;
            color:#a5a5a5;
            position:relative;
        }

        .divider::before,
        .divider::after{
            content:"";
            position:absolute;
            top:50%;
            width:40%;
            height:1px;
            background:#e5e5e5;
        }

        .divider::before{
            left:0;
        }

        .divider::after{
            right:0;
        }

        .google-btn{
            width:100%;
            height:56px;
            border:1.5px solid #e3e3e3;
            border-radius:16px;
            background:white;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        .google-btn:hover{
            background:#f8f8f8;
        }

        .bottom-text{
            margin-top:28px;
            text-align:center;
            color:#777;
            font-size:15px;
        }

        .bottom-text a{
            color:#1d4f91;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">⌂</div>

        <h2 class="title">З поверненням!</h2>

        <p class="subtitle">
            Увійдіть щоб продовжити користуватись сервісом
        </p>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            {{ form.non_field_errors }}

            <div class="form-group">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="id_password">Пароль</label>
                {{ form.password }}
            </div>

            <button type="submit" class="submit-btn">
                Увійти
            </button>

        </form>

        <div class="divider">або</div>

        <button class="google-btn">
            Продовжити з Google
        </button>

        <p class="bottom-text">
            Немає акаунта?
            <a href="{% url 'register' %}">
                Зареєструватися
            </a>
        </p>

    </div>

</div>

</body>
</html>
